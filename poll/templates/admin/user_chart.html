{% extends "admin/change_list.html" %}

{% block content %}

<h2>User Vote History (Line Chart)</h2>

<canvas id="userChart"></canvas>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<!-- ✅ Safe JSON data -->
{{ users|json_script:"users-data" }}
{{ votes|json_script:"votes-data" }}

<script>
    const users = JSON.parse(document.getElementById('users-data').textContent);
    const votes = JSON.parse(document.getElementById('votes-data').textContent);

    const ctx = document.getElementById('userChart');

    new Chart(ctx, {
        type: 'line',
        data: {
            labels: users,
            datasets: [{
                label: 'Votes per User',
                data: votes,
                borderWidth: 2
            }]
        }
    });
</script>

{{ block.super }}

{% endblock %}
